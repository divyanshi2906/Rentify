<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rentify - Login & Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS Link -->
     <link rel="stylesheet" href="CSS/stfinal.css">
     <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h1 id="title">Welcome to Rentify</h1>
        <p id="subtitle">Don't have an account?</p>
        <button id="toggleBtn">Sign Up</button>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <!-- LOGIN FORM -->
        <div class="form active" id="loginForm">
            <h2>Login</h2>

            <input type="text" name="studentId" placeholder="Student ID" required>
            <input type="password" name="password" placeholder="Password" required>
            <button class="main-btn">Login</button>
        </div>

        <!-- SIGNUP FORM -->
        <div class="form " id="signupForm">
            <h2>Create Account</h2>

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="text" name="studentId" placeholder="Student ID" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="password" name="password" placeholder="Create Password" required>

            <button class="main-btn">Sign Up</button>
        </div>

    </div>
</div>
<script src="js/scriptFi.js"></script>

</body>
</html>
